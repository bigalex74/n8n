services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    network_mode: host
    environment:
      - OLLAMA_NUM_THREAD=8
    volumes:
      - ollama_storage:/root/.ollama
    restart: always

  lightrag:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: lightrag
    network_mode: host
    environment:
      - LLM_BINDING=openai
      - LLM_MODEL=openai/gpt-4o-mini
      - LLM_BINDING_HOST=https://polza.ai/api/v1
      - LLM_BINDING_API_KEY=pza_PV5t0y6PTuE8GLcZ-jgvlpNDLlZm0mUT
      - OPENAI_API_KEY=pza_PV5t0y6PTuE8GLcZ-jgvlpNDLlZm0mUT
      - OPENAI_BASE_URL=https://polza.ai/api/v1
      - EMBEDDING_BINDING=ollama
      - EMBEDDING_MODEL=nomic-embed-text
      - EMBEDDING_BINDING_HOST=http://127.0.0.1:11434
      - EMBEDDING_DIM=768
      - CHUNK_SIZE=800
      - CHUNK_OVERLAP_SIZE=100
      - MAX_ASYNC=8
      - MAX_PARALLEL_INSERT=4
      - SUMMARY_LANGUAGE=Russian
    volumes:
      - /home/user/lightrag/inputs:/app/inputs
      - /home/user/lightrag/outputs:/app/outputs
      - /home/user/lightrag/dict:/app/dict
    restart: always

volumes:
  ollama_storage:
