global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - 'rules/alerts.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Application health checks
  - job_name: 'ollama-health'
    metrics_path: '/api/health'
    static_configs:
      - targets: ['localhost:11434']
    scrape_interval: 30s

  - job_name: 'lightrag-health'
    metrics_path: '/health'
    static_configs:
      - targets: ['localhost:9621']
    scrape_interval: 30s

  - job_name: 'n8n'
    metrics_path: '/healthz'
    static_configs:
      - targets: ['localhost:5678']
    scrape_interval: 30s

  - job_name: 'backup-exporter'
    static_configs:
      - targets: ['backup-exporter:9199']
    scrape_interval: 60s
