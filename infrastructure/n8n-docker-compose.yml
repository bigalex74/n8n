version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: n8n-docker-db-1
    restart: always
    network_mode: host
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_storage:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-docker-n8n-1
    restart: always
    network_mode: host
    environment:
      - N8N_HOST=${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=Europe/Moscow
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=127.0.0.1
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_TRUST_PROXY=true
      - N8N_PROXY_HOPS=1
      - HTTP_PROXY=http://127.0.0.1:10808
      - HTTPS_PROXY=http://127.0.0.1:10808
      - ALL_PROXY=http://127.0.0.1:10808
      - GLOBAL_AGENT_HTTP_PROXY=http://127.0.0.1:10808
      - NO_PROXY=localhost,127.0.0.1,::1
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
    volumes:
      - n8n_storage:/home/node/.n8n

  tg-polling:
    image: python:3.11-slim
    container_name: tg-polling
    restart: always
    network_mode: host
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - /home/user/telegram-apps/telegram_polling.py:/app/telegram_polling.py:ro
    working_dir: /app
    command: sh -c "pip install pyTelegramBotAPI requests && python3 -u -c 'import sys; sys.path.append(\".\"); from telegram_polling import run_polling; run_polling()'"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: n8n-docker-pgadmin-1
    restart: always
    network_mode: host
    environment:
      - PGADMIN_DEFAULT_EMAIL=${SSL_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:?Set via Infisical}
      - PGADMIN_LISTEN_PORT=5055
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - /home/user/n8n-docker/pgadmin-servers.json:/pgadmin4/servers.json:ro

  gemini-bridge:
    image: python:3.11-slim
    container_name: gemini-bridge
    network_mode: host
    environment:
      - GOOGLE_AI_STUDIO_KEY=${GOOGLE_AI_STUDIO_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - /home/user/n8n-docker/scripts/gemini_bridge.py:/app/bridge.py:ro
    command: sh -c "pip install flask requests && python3 /app/bridge.py"
    restart: always

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_EXPORTER_DATA_SOURCE_NAME:?Set via Infisical}
    restart: always
    ports:
      - 9187:9187

volumes:
  db_storage:
  n8n_storage:
  prometheus_data:
